<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Multi-Agent AI</title>
    <meta name="description" content="Nexus multi-agent AI with persistent chat history and context-aware follow-up.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg: #09090b; --surface: rgba(24,24,27,.65); --grad: linear-gradient(135deg,#3b82f6,#8b5cf6 50%,#ec4899);
    --primary: #8b5cf6; --green: #10b981; --text: #fafafa; --muted: #a1a1aa;
    --border: rgba(255,255,255,.08); --shadow: 0 8px 32px rgba(0,0,0,.37);
    --sidebar-w: 270px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}

/* ── Mesh bg ── */
.mesh-bg{position:fixed;inset:0;z-index:-1;
    background:radial-gradient(circle at 15% 50%,rgba(59,130,246,.15),transparent 25%),
               radial-gradient(circle at 85% 30%,rgba(139,92,246,.15),transparent 25%),
               radial-gradient(circle at 60% 80%,rgba(236,72,153,.15),transparent 25%);
    filter:blur(60px);animation:breathe 10s ease-in-out infinite alternate}
@keyframes breathe{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.1);opacity:1}}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:rgba(15,15,20,.85);border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;transition:width .3s ease,opacity .3s ease;overflow:hidden;
    backdrop-filter:blur(20px)}
.sidebar.collapsed{width:0;opacity:0;pointer-events:none}
.sidebar-head{padding:20px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sidebar-head h2{font-size:1rem;font-weight:600;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-head button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:4px;border-radius:6px;transition:color .2s}
.sidebar-head button:hover{color:var(--text)}
.sidebar-search{padding:10px 12px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;
    padding:8px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem;outline:none}
.sidebar-search input::placeholder{color:var(--muted)}
.sidebar-search input:focus{border-color:rgba(139,92,246,.4)}
.sessions-list{flex:1;overflow-y:auto;padding:8px}
.sessions-list::-webkit-scrollbar{width:4px}
.sessions-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.session-item{padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;
    transition:all .2s ease;margin-bottom:6px;position:relative}
.session-item:hover{background:rgba(255,255,255,.05);border-color:var(--border)}
.session-item.active{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3)}
.session-item .s-title{font-size:.85rem;font-weight:500;color:#e4e4e7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item .s-meta{font-size:.72rem;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center}
.session-item .s-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;
    color:var(--muted);cursor:pointer;opacity:0;transition:opacity .2s;font-size:.8rem;padding:4px}
.session-item:hover .s-del{opacity:1}
.session-item .s-del:hover{color:#f87171}
.sessions-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:30px 16px}
.sidebar-new{padding:12px;border-top:1px solid var(--border)}
.sidebar-new button{width:100%;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;
    padding:10px;border-radius:10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;
    transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.sidebar-new button:hover{background:rgba(139,92,246,.3)}

/* ── Main layout ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.container{width:100%;max-width:900px;padding:50px 20px 80px;display:flex;flex-direction:column;gap:28px;z-index:1}

/* ── Top bar (toggle + header) ── */
.top-bar{display:flex;align-items:center;gap:16px}
.toggle-sidebar-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);
    width:40px;height:40px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .2s;flex-shrink:0}
.toggle-sidebar-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.header{text-align:center;flex:1}
.header h1{font-size:3rem;background:var(--grad);-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;font-weight:700;letter-spacing:-.05em;margin-bottom:8px}
.header p{color:var(--muted);font-size:1.1rem;font-weight:300}

/* ── Input box ── */
.input-box{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:22px;
    box-shadow:var(--shadow);backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:18px;
    transition:transform .3s,box-shadow .3s;animation:fadeIn .8s ease .2s both}
.input-box:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.45)}
textarea{width:100%;height:100px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:14px;
    padding:18px;color:var(--text);font-family:'Outfit',sans-serif;font-size:1.05rem;resize:none;
    transition:all .3s;line-height:1.5}
textarea:focus{outline:none;border-color:rgba(139,92,246,.5);box-shadow:0 0 0 4px rgba(139,92,246,.15);background:rgba(0,0,0,.3)}
textarea::placeholder{color:rgba(161,161,170,.6)}

/* ── Upload zone ── */
.upload-zone{border:2px dashed rgba(139,92,246,.3);border-radius:14px;padding:18px 22px;
    display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .3s;
    background:rgba(139,92,246,.04);position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:rgba(139,92,246,.7);background:rgba(139,92,246,.1)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{width:42px;height:42px;background:linear-gradient(135deg,rgba(139,92,246,.3),rgba(59,130,246,.3));
    border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#c4b5fd;flex-shrink:0}
.upload-text strong{color:#e4e4e7;font-size:.9rem;display:block}
.upload-text span{color:var(--muted);font-size:.78rem}
.file-badge{margin-left:auto;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;
    padding:6px 12px;border-radius:20px;font-size:.8rem;font-weight:600;display:none;align-items:center;gap:6px;
    white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.file-badge.show{display:flex}
.clear-file-btn{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;
    padding:3px 8px;border-radius:6px;cursor:pointer;font-size:.75rem;margin-left:4px;transition:all .2s}
.clear-file-btn:hover{background:rgba(239,68,68,.3)}

/* ── Controls ── */
.controls{display:flex;gap:14px;justify-content:flex-end;align-items:center}
.btn{display:flex;align-items:center;gap:8px;padding:13px 26px;border-radius:13px;font-weight:600;
    font-size:1rem;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);border:none;font-family:'Outfit',sans-serif}
.btn-mic{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--border)}
.btn-mic:hover{background:rgba(255,255,255,.1)}
.btn-mic.recording{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.4);animation:pulse-red 2s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}70%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
.btn-submit{background:var(--grad);color:#fff;box-shadow:0 4px 15px rgba(139,92,246,.3)}
.btn-submit:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 25px rgba(139,92,246,.5)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

/* ── File preview panel ── */
#file-preview-panel{background:var(--surface);border:1px solid rgba(16,185,129,.25);border-radius:18px;
    padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(20px);display:none;flex-direction:column;gap:16px}
#file-preview-panel.visible{display:flex;animation:floatUp .5s ease both}
.preview-title{font-size:1rem;font-weight:600;color:#6ee7b7;display:flex;align-items:center;gap:8px}
.preview-summary{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;padding:16px;
    font-family:'Fira Code',monospace;font-size:.8rem;color:#d4d4d8;white-space:pre-wrap;line-height:1.7;
    max-height:220px;overflow-y:auto}
.preview-chart img{width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.preview-insights{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.2);border-radius:10px;padding:16px}
.preview-insights h4{color:#c4b5fd;font-size:.82rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.analyze-loading{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.9rem;padding:8px 0}

/* ── Status chips ── */
.status-tracker{display:flex;flex-wrap:wrap;gap:10px}
.chip{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:#93c5fd;padding:9px 18px;
    border-radius:10px;font-size:.9rem;font-weight:500;display:flex;align-items:center;gap:8px;
    animation:chipEnter .5s cubic-bezier(.2,.8,.2,1) forwards;opacity:0;transform:translateY(8px) scale(.95)}
@keyframes chipEnter{to{opacity:1;transform:translateY(0) scale(1)}}
.chip.done{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:#6ee7b7}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-radius:50%;border-top-color:currentColor;animation:spin 1s linear infinite}

/* ── Result card ── */
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:36px;
    box-shadow:var(--shadow);backdrop-filter:blur(20px);display:none;line-height:1.8;color:#e4e4e7}
.result-card.visible{display:block;animation:floatUp .8s cubic-bezier(.2,.8,.2,1) both}
.result-card h2{font-size:1.7rem;border-bottom:1px solid var(--border);padding-bottom:8px;margin:1.4em 0 .7em;color:#fff}
.result-card h3{font-size:1.3rem;color:#fff;margin:1.2em 0 .6em}
.result-card a{color:#60a5fa;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
.result-card a:hover{border-color:#60a5fa}
.result-card pre{background:#000000bd;padding:18px;border-radius:10px;overflow-x:auto;border:1px solid var(--border);margin:16px 0}
.result-card code{font-family:'Fira Code',monospace;background:rgba(255,255,255,.08);padding:3px 7px;border-radius:5px;font-size:.88em}
pre code{background:transparent!important;padding:0!important}
.result-card ul,ol{padding-left:18px;margin-bottom:16px}
.result-card li{margin-bottom:6px}
table{border-collapse:collapse;width:100%;margin:20px 0;border-radius:10px;overflow:hidden}
th,td{border:1px solid var(--border);padding:14px;text-align:left}
th{background:rgba(255,255,255,.05);color:#fff;font-weight:500}
tr:nth-child(even){background:rgba(255,255,255,.02)}

/* ── Agent step cards ── */
.agent-step{background:var(--surface);border:1px solid var(--border);border-radius:14px;
    margin-bottom:14px;box-shadow:var(--shadow);backdrop-filter:blur(20px);overflow:hidden;animation:fadeIn .4s ease}
.agent-step-header{padding:16px 22px;background:rgba(255,255,255,.05);font-weight:600;display:flex;
    justify-content:space-between;align-items:center;cursor:pointer;color:#fff;transition:background .2s}
.agent-step-header:hover{background:rgba(255,255,255,.08)}
.agent-step-content{padding:22px;display:none;border-top:1px solid var(--border);color:#d4d4d8;line-height:1.6}
.agent-step.open .agent-step-content{display:block}
.agent-step-content pre{background:#000000bd;padding:14px;border-radius:8px;border:1px solid var(--border);overflow-x:auto;margin:8px 0}
.inputs-tags{font-size:.85rem;color:var(--muted);margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.tag{background:rgba(139,92,246,.2);color:#d8b4fe;padding:3px 9px;border-radius:10px;font-size:.77rem}
.code-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:-8px;position:relative;z-index:10}
.code-toolbar button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;
    padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.82rem;transition:all .2s;
    font-family:'Outfit',sans-serif;display:flex;align-items:center;gap:5px}
.code-toolbar button:hover{background:rgba(139,92,246,.5);border-color:rgba(139,92,246,.8)}

/* ── Chat panel ── */
#chat-panel{background:var(--surface);border:1px solid rgba(139,92,246,.25);border-radius:22px;
    padding:24px;box-shadow:var(--shadow);backdrop-filter:blur(20px);display:none;flex-direction:column;gap:0}
#chat-panel.visible{display:flex;animation:floatUp .6s ease both}
.chat-panel-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.chat-panel-header h3{font-size:1rem;font-weight:600;color:#c4b5fd}
.chat-panel-header span{font-size:.8rem;color:var(--muted);background:rgba(139,92,246,.15);padding:3px 10px;border-radius:8px}
.chat-messages{display:flex;flex-direction:column;gap:14px;max-height:420px;overflow-y:auto;
    padding-right:4px;margin-bottom:16px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
.chat-msg{display:flex;gap:12px;animation:fadeIn .3s ease}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:.9rem;flex-shrink:0}
.chat-msg.user .chat-avatar{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
.chat-msg.assistant .chat-avatar{background:linear-gradient(135deg,#8b5cf6,#ec4899)}
.chat-bubble{max-width:78%;padding:12px 16px;border-radius:14px;font-size:.92rem;line-height:1.6}
.chat-msg.user .chat-bubble{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.25);color:#e4e4e7;text-align:right}
.chat-msg.assistant .chat-bubble{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);color:#e4e4e7}
.chat-bubble p{margin:0 0 6px}
.chat-bubble p:last-child{margin:0}
.chat-bubble code{font-family:'Fira Code',monospace;background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-size:.85em}
.chat-bubble pre{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:10px;overflow-x:auto;margin:8px 0}
.chat-bubble ul{padding-left:16px;margin:6px 0}
.chat-bubble li{margin-bottom:4px}
.chat-typing{display:flex;align-items:center;gap:5px;padding:12px 16px;background:rgba(139,92,246,.07);
    border-radius:12px;border:1px solid rgba(139,92,246,.15);width:fit-content}
.chat-typing span{width:7px;height:7px;background:#8b5cf6;border-radius:50%;animation:typingDot 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}
.chat-input-row{display:flex;gap:10px}
.chat-input-row input{flex:1;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:all .3s}
.chat-input-row input:focus{border-color:rgba(139,92,246,.5);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
.chat-input-row input::placeholder{color:rgba(161,161,170,.5)}
.chat-send-btn{background:var(--grad);border:none;color:#fff;width:46px;height:46px;border-radius:12px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .3s;flex-shrink:0}
.chat-send-btn:hover{transform:scale(1.05);box-shadow:0 4px 15px rgba(139,92,246,.4)}
.chat-send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

@keyframes spin{100%{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
    .sidebar{position:fixed;z-index:100;height:100vh}
    .container{padding:30px 14px}
    .header h1{font-size:2.2rem}
    .controls{flex-direction:column}
    .btn{width:100%;justify-content:center}
}
</style>
</head>
<body>
<div class="mesh-bg"></div>

<!-- ── Page Shell ── -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
        <h2><i class="fas fa-history"></i> Chat History</h2>
        <button onclick="toggleSidebar()" title="Close"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-search">
        <input type="text" id="session-search" placeholder="&#xF002; Search sessions…" oninput="filterSessions(this.value)">
    </div>
    <div id="sessions-list" class="sessions-list">
        <div class="sessions-empty"><i class="fas fa-robot" style="font-size:1.8rem;opacity:.3;display:block;margin-bottom:8px"></i>No saved sessions yet</div>
    </div>
    <div class="sidebar-new">
        <button onclick="startNewSession()"><i class="fas fa-plus"></i> New Session</button>
    </div>
</aside>

<div class="main" id="main-area">
<div class="container">

    <!-- Top bar -->
    <div class="top-bar">
        <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Toggle history">
            <i class="fas fa-bars"></i>
        </button>
        <div class="header" style="animation:slideDown .8s ease both">
            <h1>Nexus Multi-Agent AI</h1>
            <p>Autonomous agents · persistent chat · context-aware follow-up</p>
        </div>
    </div>

    <!-- Input box -->
    <div class="input-box">
        <textarea id="task" placeholder="Describe your task… e.g. 'Analyse this sales dataset' or 'Build a Python web scraper'"></textarea>

        <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept=".csv,.xlsx,.xls" onchange="handleFileSelect(this)">
            <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <div class="upload-text">
                <strong>Upload CSV or Excel</strong>
                <span>Drag &amp; drop or click · auto-analyzes with AI insights &amp; charts</span>
            </div>
            <div class="file-badge" id="file-badge">
                <i class="fas fa-file-csv"></i>
                <span id="file-badge-name"></span>
                <button class="clear-file-btn" onclick="clearFile(event)"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <div class="controls">
            <button id="mic-btn" class="btn btn-mic" onclick="toggleVoice()">
                <i class="fas fa-microphone"></i><span>Voice</span>
            </button>
            <button id="submit-btn" class="btn btn-submit" onclick="runTask()">
                <i class="fas fa-sparkles"></i><span>Initialize Agents</span>
            </button>
        </div>
    </div>

    <!-- File preview panel -->
    <div id="file-preview-panel">
        <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="preview-title"><i class="fas fa-chart-bar"></i> File Analysis</div>
            <span id="preview-filename" style="color:var(--muted);font-size:.85rem"></span>
        </div>
        <div id="preview-loading" class="analyze-loading" style="display:none"><div class="spinner"></div> Running AI analysis…</div>
        <div id="preview-summary" class="preview-summary" style="display:none"></div>
        <div id="preview-chart" style="display:none"></div>
        <div id="preview-insights" class="preview-insights" style="display:none">
            <h4><i class="fas fa-lightbulb"></i> AI Insights</h4>
            <div id="preview-insights-content"></div>
        </div>
        <div id="preview-error" style="color:#f87171;font-size:.88rem;display:none"></div>
    </div>

    <!-- Agent outputs -->
    <div id="output-area">
        <div id="tracker" class="status-tracker"></div>
        <div id="agent-outputs" style="margin-top:16px;display:flex;flex-direction:column;gap:14px"></div>
        <div id="final-result" class="result-card" style="margin-top:16px"></div>
    </div>

    <!-- Context-aware Chat panel -->
    <div id="chat-panel">
        <div class="chat-panel-header">
            <i class="fas fa-comments" style="color:#8b5cf6"></i>
            <h3>Context-Aware Chat</h3>
            <span id="chat-session-label">Session active</span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Ask a follow-up question about the results…"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}">
            <button class="chat-send-btn" id="chat-send-btn" onclick="sendChat()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

</div><!-- /container -->
</div><!-- /main -->

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let selectedFile      = null;
let currentSessionId  = null;
let allSessions       = [];

// ── Sidebar ────────────────────────────────────────────────────────────────────
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
}

function filterSessions(q) {
    renderSessions(q.trim().toLowerCase());
}

function renderSessions(filter = '') {
    const list = document.getElementById('sessions-list');
    const items = filter
        ? allSessions.filter(s => s.title.toLowerCase().includes(filter))
        : allSessions;

    if (!items.length) {
        list.innerHTML = `<div class="sessions-empty"><i class="fas fa-search" style="display:block;margin-bottom:8px;opacity:.3"></i>${filter ? 'No matches' : 'No saved sessions yet'}</div>`;
        return;
    }
    list.innerHTML = items.map(s => {
        const d = new Date(s.updated * 1000);
        const when = d.toLocaleDateString(undefined, {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
        const active = s.id === currentSessionId ? ' active' : '';
        return `<div class="session-item${active}" onclick="loadSession('${s.id}')" id="sitem-${s.id}">
            <div class="s-title">${escHtml(s.title)}</div>
            <div class="s-meta"><i class="fas fa-clock"></i>${when} &middot; ${s.msg_count} msg${s.msg_count!==1?'s':''}</div>
            <button class="s-del" onclick="deleteSession(event,'${s.id}')" title="Delete"><i class="fas fa-trash"></i></button>
        </div>`;
    }).join('');
}

async function fetchSessions() {
    try {
        const r = await fetch('/sessions');
        allSessions = await r.json();
        renderSessions(document.getElementById('session-search').value.trim().toLowerCase());
    } catch(e) { console.warn('session fetch failed', e); }
}

async function loadSession(sid) {
    try {
        const r = await fetch(`/sessions/${sid}`);
        if (!r.ok) return;
        const s = await r.json();

        currentSessionId = sid;
        renderSessions(document.getElementById('session-search').value);

        // Restore task text
        document.getElementById('task').value = s.task || '';

        // Clear existing outputs
        document.getElementById('tracker').innerHTML = '';
        document.getElementById('agent-outputs').innerHTML = '';
        const rc = document.getElementById('final-result');
        rc.classList.remove('visible'); rc.innerHTML = '';

        // Show summary from last assistant message
        const summary = s.messages.find(m => m.role === 'assistant' && m.content);
        if (summary) {
            rc.classList.add('visible');
            rc.innerHTML = `<h3><i class="fas fa-history"></i> Restored Session</h3>` + marked.parse(String(summary.content));
        }

        // Restore chat messages (after the first summary)
        const chatMsgs = s.messages.slice(1);
        const chatEl   = document.getElementById('chat-messages');
        chatEl.innerHTML = '';
        chatMsgs.forEach(m => appendChatBubble(m.role, m.content));

        // Show chat panel
        openChatPanel(sid, s.title);

    } catch(e) { console.error('loadSession error', e); }
}

async function deleteSession(e, sid) {
    e.stopPropagation();
    if (!confirm('Delete this session?')) return;
    await fetch(`/sessions/${sid}`, {method:'DELETE'});
    if (currentSessionId === sid) {
        currentSessionId = null;
        document.getElementById('chat-panel').classList.remove('visible');
    }
    allSessions = allSessions.filter(s => s.id !== sid);
    renderSessions();
}

function startNewSession() {
    currentSessionId = null;
    document.getElementById('task').value = '';
    document.getElementById('tracker').innerHTML = '';
    document.getElementById('agent-outputs').innerHTML = '';
    const rc = document.getElementById('final-result');
    rc.classList.remove('visible'); rc.innerHTML = '';
    const cp = document.getElementById('chat-panel');
    cp.classList.remove('visible');
    document.getElementById('chat-messages').innerHTML = '';
    clearFile({stopPropagation:()=>{}});
    renderSessions();
}

// ── File upload ────────────────────────────────────────────────────────────────
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e=>{e.preventDefault();uploadZone.classList.add('drag-over')});
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e=>{e.preventDefault();uploadZone.classList.remove('drag-over');if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0])});

function handleFileSelect(input){if(input.files[0]) processFile(input.files[0])}

function processFile(file) {
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!['.csv','.xlsx','.xls'].includes(ext)){alert('Upload CSV or Excel only');return}
    selectedFile = file;
    document.getElementById('file-badge-name').textContent = file.name;
    document.getElementById('file-badge').classList.add('show');
    const panel = document.getElementById('file-preview-panel');
    panel.classList.add('visible');
    document.getElementById('preview-filename').textContent = file.name;
    runFileAnalysis(file);
}

function clearFile(e) {
    e.stopPropagation();
    selectedFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-badge').classList.remove('show');
    const panel = document.getElementById('file-preview-panel');
    panel.classList.remove('visible');
    ['preview-loading','preview-summary','preview-chart','preview-insights','preview-error'].forEach(id=>{
        document.getElementById(id).style.display='none';
    });
    document.getElementById('preview-chart').innerHTML = '';
    document.getElementById('preview-insights-content').innerHTML = '';
}

async function runFileAnalysis(file) {
    ['preview-loading','preview-summary','preview-chart','preview-insights','preview-error'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('preview-loading').style.display='flex';
    // Hide chat panel until analysis is done
    document.getElementById('chat-panel').classList.remove('visible');
    document.getElementById('chat-messages').innerHTML='';
    currentSessionId = null;
    try {
        const fd = new FormData(); fd.append('file', file);
        const r = await fetch('/analyze-file',{method:'POST',body:fd});
        const data = await r.json();
        document.getElementById('preview-loading').style.display='none';
        if (data.error){
            document.getElementById('preview-error').textContent='⚠ '+data.error;
            document.getElementById('preview-error').style.display='block';
            return;
        }
        if (data.summary){document.getElementById('preview-summary').textContent=data.summary;document.getElementById('preview-summary').style.display='block'}
        if (data.chart_b64){document.getElementById('preview-chart').innerHTML=`<img src="data:image/png;base64,${data.chart_b64}" alt="chart">`;document.getElementById('preview-chart').style.display='block'}
        if (data.insights){document.getElementById('preview-insights-content').innerHTML=marked.parse(String(data.insights));document.getElementById('preview-insights').style.display='block'}

        // ── Open chat panel immediately after CSV analysis ─────────────────
        if (data.session_id) {
            currentSessionId = data.session_id;
            document.getElementById('chat-session-label').textContent = 'Analysing: ' + (data.filename || file.name);
            document.getElementById('chat-messages').innerHTML = '';
            // Show a welcome message in the chat
            appendChatBubble('assistant',
                `**File \`${data.filename}\` analysed successfully!** 🎉\n\nI have the full dataset summary and insights in context. Ask me anything about the data — distributions, patterns, anomalies, comparisons, or next steps.`
            );
            document.getElementById('chat-panel').classList.add('visible');
            document.getElementById('chat-panel').scrollIntoView({behavior:'smooth', block:'start'});
            fetchSessions();
        }
    } catch(err) {
        document.getElementById('preview-loading').style.display='none';
        document.getElementById('preview-error').textContent='Network error: '+err.message;
        document.getElementById('preview-error').style.display='block';
    }
}


// ── Voice ──────────────────────────────────────────────────────────────────────
let recognition=null, isRecording=false;
const micBtn=document.getElementById('mic-btn');
if ('webkitSpeechRecognition' in window||'SpeechRecognition' in window){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR(); recognition.continuous=true; recognition.interimResults=true;
    recognition.onstart=()=>{isRecording=true;micBtn.classList.add('recording');micBtn.querySelector('i').className='fas fa-stop-circle';micBtn.querySelector('span').textContent=' Listening…'};
    recognition.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;document.getElementById('task').value=t};
    recognition.onerror=recognition.onend=()=>{isRecording=false;micBtn.classList.remove('recording');micBtn.querySelector('i').className='fas fa-microphone';micBtn.querySelector('span').textContent=' Voice'};
} else { micBtn.style.display='none'; }
function toggleVoice(){if(isRecording)recognition.stop();else{document.getElementById('task').value='';recognition.start()}}

// ── Agent chips + step cards ───────────────────────────────────────────────────
function appendChip(name){
    const tracker=document.getElementById('tracker');
    const label=name.replace(/_agent/g,'').replace(/_/g,' ');
    const fmt=label.charAt(0).toUpperCase()+label.slice(1);
    const active=tracker.querySelector('.chip:not(.done)');
    if(active){if(active.dataset.name===fmt)return;active.classList.add('done');active.innerHTML=`<i class="fas fa-check-circle"></i> ${active.dataset.name}`;}
    const c=document.createElement('div');c.className='chip';c.dataset.name=fmt;
    c.innerHTML=`<div class="spinner"></div> ${fmt}`;tracker.appendChild(c);
}

function appendStepCard(id,title,html,iter){
    const container=document.getElementById('agent-outputs');
    const stepId='step-'+id+'-'+(iter||0);
    const existing=document.getElementById(stepId);
    if(existing){existing.querySelector('.agent-step-content').innerHTML=html;return}
    const div=document.createElement('div');div.id=stepId;div.className='agent-step open';
    div.innerHTML=`<div class="agent-step-header" onclick="this.parentElement.classList.toggle('open')">
        <span><i class="fas fa-robot"></i> ${title}</span><i class="fas fa-chevron-down"></i>
    </div><div class="agent-step-content">${html}</div>`;
    container.appendChild(div);
}

function downloadCode(code){const b=new Blob([code],{type:'text/x-python'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='generated_code.py';a.click();URL.revokeObjectURL(u)}

// ── Run Task ───────────────────────────────────────────────────────────────────
function runTask(){
    const task=document.getElementById('task').value.trim();
    if(!task){document.getElementById('task').focus();return}

    const btn=document.getElementById('submit-btn');
    const bIcon=btn.querySelector('i'), bSpan=btn.querySelector('span');
    btn.disabled=true;bIcon.className='fas fa-circle-notch fa-spin';bSpan.textContent=' Running…';

    document.getElementById('tracker').innerHTML='';
    document.getElementById('agent-outputs').innerHTML='';
    const rc=document.getElementById('final-result');rc.classList.remove('visible');rc.innerHTML='';
    document.getElementById('chat-panel').classList.remove('visible');
    document.getElementById('chat-messages').innerHTML='';
    currentSessionId=null;

    const fetchOpts = selectedFile
        ? (()=>{const fd=new FormData();fd.append('task',task);fd.append('file',selectedFile);return{method:'POST',body:fd}})()
        : {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task})};

    fetch('/run',fetchOpts).then(res=>{
        const reader=res.body.getReader(), dec=new TextDecoder();
        let buf='';
        function processLines(text){
            buf+=text;
            const chunks=buf.split('\n\n');buf=chunks.pop();
            chunks.forEach(chunk=>{
                if(!chunk.trim().startsWith('data: '))return;
                try{
                    const ev=JSON.parse(chunk.substring(6).trim());
                    handleSSE(ev);
                }catch(e){console.warn('parse err',e)}
            });
        }
        function read(){reader.read().then(({done,value})=>{
            if(done){
                btn.disabled=false;bIcon.className='fas fa-sparkles';bSpan.textContent=' Initialize Agents';
                const last=document.getElementById('tracker').querySelector('.chip:not(.done)');
                if(last){last.classList.add('done');last.innerHTML=`<i class="fas fa-check-circle"></i> ${last.dataset.name}`;}
                fetchSessions();
                return;
            }
            processLines(dec.decode(value));read();
        });}
        read();
    }).catch(err=>{btn.disabled=false;bIcon.className='fas fa-sparkles';bSpan.textContent=' Initialize Agents';console.error(err)});
}

function handleSSE(ev){
    const {node, data}=ev;
    if(node==='error'){
        const rc=document.getElementById('final-result');rc.classList.add('visible');
        rc.innerHTML=`<h3><i class="fas fa-exclamation-triangle"></i> Error</h3><p>${data.message}</p><pre>${data.trace||''}</pre>`;
        return;
    }
    if(node==='summarizer'&&data.final_output){
        const active=document.getElementById('tracker').querySelector('.chip:not(.done)');
        if(active){active.classList.add('done');active.innerHTML=`<i class="fas fa-check-circle"></i> ${active.dataset.name}`;}
        const rc=document.getElementById('final-result');rc.classList.add('visible');
        rc.innerHTML=`<h3><i class="fas fa-flag-checkered"></i> Final Summary</h3>`+marked.parse(String(data.final_output));
        if(data.session_id){
            currentSessionId=data.session_id;
            openChatPanel(data.session_id,'Session '+data.session_id);
            fetchSessions();
        }
        return;
    }
    if(node) appendChip(node);
    if(['error','coordinator'].includes(node))return;
    if(data.output||data.plan){
        let title=node.charAt(0).toUpperCase()+node.slice(1)+' Output';
        const iter=data.iterations||0;
        if(iter>0&&['code','review','critic'].includes(node))title+=` <span style="color:#6ee7b7;font-size:.82em">(Iter ${iter})</span>`;
        let inputs='Task info';
        if(node==='code')inputs='Research, Tool, Critic';
        else if(node==='review'||node==='critic')inputs='Code Output';
        else if(node==='tool')inputs='Research, File Analysis';
        let html=`<div class="inputs-tags"><strong><i class="fas fa-link"></i> Context:</strong> ${inputs.split(', ').map(t=>`<span class="tag">${t}</span>`).join('')}</div>`;
        if(data.plan)html+=`<pre>${JSON.stringify(data.plan,null,2)}</pre>`;
        if(data.output){
            let out=typeof data.output==='object'?JSON.stringify(data.output,null,2):String(data.output);
            if(node==='code'){
                const m=[...out.matchAll(/```(?:python)?\n([\s\S]*?)```/g)];
                const raw=m.length?m.map(x=>x[1]).join('\n\n'):out.replace(/```\w*\n?/g,'');
                const enc=encodeURIComponent(raw);
                html+=`<div class="code-toolbar">
                    <button onclick="navigator.clipboard.writeText(decodeURIComponent('${enc}'))"><i class="fas fa-copy"></i> Copy</button>
                    <button onclick="downloadCode(decodeURIComponent('${enc}'))"><i class="fas fa-download"></i> .py</button>
                </div>`;
            }
            html+=`<div>${marked.parse(out)}</div>`;
        }
        appendStepCard(node,title,html,iter);
    }
}

// ── Chat ───────────────────────────────────────────────────────────────────────
function openChatPanel(sid, title){
    currentSessionId=sid;
    document.getElementById('chat-session-label').textContent=title||'Session '+sid;
    document.getElementById('chat-panel').classList.add('visible');
    document.getElementById('chat-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

function appendChatBubble(role, content){
    const el=document.createElement('div');el.className=`chat-msg ${role}`;
    const icon=role==='user'?'fa-user':'fa-robot';
    const parsed=marked.parse(String(content||''));
    el.innerHTML=`<div class="chat-avatar"><i class="fas ${icon}"></i></div><div class="chat-bubble">${parsed}</div>`;
    document.getElementById('chat-messages').appendChild(el);
    el.scrollIntoView({behavior:'smooth',block:'end'});
}

function showTyping(){
    const el=document.createElement('div');el.className='chat-msg assistant';el.id='typing-indicator';
    el.innerHTML=`<div class="chat-avatar"><i class="fas fa-robot"></i></div><div class="chat-typing"><span></span><span></span><span></span></div>`;
    document.getElementById('chat-messages').appendChild(el);
    el.scrollIntoView({behavior:'smooth',block:'end'});
}

async function sendChat(){
    if(!currentSessionId){alert('Run a task first to start chatting.');return}
    const input=document.getElementById('chat-input');
    const msg=input.value.trim();if(!msg)return;
    input.value='';
    const btn=document.getElementById('chat-send-btn');btn.disabled=true;

    appendChatBubble('user',msg);
    showTyping();

    try{
        const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({session_id:currentSessionId,message:msg})});
        const data=await r.json();
        document.getElementById('typing-indicator')?.remove();
        if(data.error){appendChatBubble('assistant','⚠️ '+data.error);}
        else{appendChatBubble('assistant',data.response||'No response.');}
        fetchSessions();
    }catch(err){
        document.getElementById('typing-indicator')?.remove();
        appendChatBubble('assistant','Network error: '+err.message);
    }finally{btn.disabled=false;input.focus();}
}

// ── Utils ──────────────────────────────────────────────────────────────────────
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Init ───────────────────────────────────────────────────────────────────────
fetchSessions();
</script>
</body>
</html>
