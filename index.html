<!DOCTYPE html>
<html>
<head>
  <title>A2A + MCP Agent Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 80px; padding: 10px; font-size: 14px; }
    button { padding: 10px 24px; background: #6c47ff; color: white; border: none; 
             border-radius: 6px; cursor: pointer; font-size: 14px; }
    #output { margin-top: 24px; }
    .step { background: #f5f5f5; border-left: 3px solid #6c47ff; 
            padding: 12px; margin: 8px 0; border-radius: 4px; }
    .label { font-weight: bold; color: #6c47ff; font-size: 12px; }
  </style>
</head>
<body>
  <h2>🤖 A2A + MCP Agent Workflow</h2>
  <textarea id="task" placeholder="Type your task... e.g. Research quantum computing and write a Python simulation"></textarea>
  <br><br>
  <button onclick="runTask()">Run Agents</button>
  <div id="output"></div>

  <script>
    function runTask() {
      const task = document.getElementById("task").value;
      const output = document.getElementById("output");
      output.innerHTML = "<p>Running agents...</p>";

      fetch("/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task })
      }).then(res => {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        output.innerHTML = "";

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) return;
            const text = decoder.decode(value);
            const lines = text.split("\n").filter(l => l.startsWith("data:"));
            lines.forEach(line => {
              const data = JSON.parse(line.replace("data: ", ""));
              const node = Object.keys(data)[0];
              const state = data[node];
              const div = document.createElement("div");
              div.className = "step";
              div.innerHTML = `<div class="label">${node.toUpperCase()}</div>
                <pre>${JSON.stringify(state, null, 2)}</pre>`;
              output.appendChild(div);
            });
            read();
          });
        }
        read();
      });
    }
  </script>
</body>
</html>
